# Make the system-installed JDK 17 discoverable by Gradle's toolchain detection,
# so :core/:android can target Java 17 without provisioning a new JDK.
# (Homebrew installs openjdk@17 outside the macos java_home registry.)
org.gradle.java.installations.paths=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home,/opt/homebrew/Cellar/openjdk@17/17.0.19/libexec/openjdk.jdk/Contents/Home

# Quieter, reproducible builds.
org.gradle.warning.mode=summary
